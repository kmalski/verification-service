spring:
  application:
    name: 'verification-service'
  threads:
    virtual:
      enabled: true
  mvc:
    apiversion:
      supported: 1.0
      default: 1.0
      use:
        path-segment: 0

verification:
  check:
    timeout: 5s
    enabled:
      - VELOCITY
      - FRAUD
    velocity:
      window: 1m
      limit: 10
